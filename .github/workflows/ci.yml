name: CI

on:
  push:
  pull_request:

jobs:
  moonbit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install web dependencies
        run: bun install

      - name: Moon update shared
        run: moon -C shared update

      - name: Moon update backend
        run: moon -C backend update

      - name: Moon update frontend
        run: moon -C frontend update

      - name: Check shared formatting
        run: moon -C shared fmt --check

      - name: Check backend formatting
        run: moon -C backend fmt --check

      - name: Check frontend formatting
        run: moon -C frontend fmt --check

      - name: Check shared
        run: moon -C shared check --target all

      - name: Check backend
        run: moon -C backend check --target native

      - name: Check frontend
        run: moon -C frontend check --target js

      - name: Run backend tests
        run: moon -C backend test . --target native

      - name: Run frontend tests
        run: moon -C frontend test app --target js

      - name: Run backend API tests
        run: make test-api
